services:
  manager:
    build: .
    command: ["/app/manager", "-addr", ":8080", "-state", "/app/data/manager"]
    ports:
      - "8080:8080"
    volumes:
      - manager-data:/app/data/manager
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  broker:
    build: .
    command:
      - "/app/broker"
      - "-addr"
      - ":8081"
      - "-data"
      - "/app/data/broker"
      - "-manager"
      - "http://manager:8080"
      - "-public-url"
      - "http://broker:8081"
    ports:
      - "8081:8081"
    volumes:
      - broker-data:/app/data/broker
    depends_on:
      manager:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  manager-data:
  broker-data:
